    negatives_from_same_seq_only: True
    steps_predicted: 14
    
  enc:
    features: [ 512, 512, 512, 512 ]
    kss: [ 3, 1, 1, 1 ]
    strides: [ 2, 1, 1, 1 ]
  pred:
    causal: True
    state_dim: 8
    model_dim: 512
    backbone: "s42"
  head_ssl:
    multi_prediction: true
    bias: false