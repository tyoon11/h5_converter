base:
  batch_size: 64
  fs: 240.
  input_channels: 12
  input_size: 10.
  normalize: false

trainer:
  gpus: 1
  refresh_rate: 1
  epochs: 200
  precision: 32
  checkpoint_every_n_train_steps: 10000
  checkpoint_every_n_epochs: 0

ts:
